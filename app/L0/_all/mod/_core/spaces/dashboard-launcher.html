<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/spaces/dashboard-launcher.css" />
    <script type="module" src="/mod/_core/spaces/dashboard-launcher.js"></script>
  </head>
  <body>
    <section class="dashboard-spaces-launcher" x-data="spacesDashboardLauncher()" x-init="init()">
      <div class="dashboard-spaces-launcher-header">
        <div>
          <p class="page-eyebrow">Spaces</p>
          <h2>Open an existing space or create a new one.</h2>
          <p class="dashboard-spaces-launcher-copy">
            This content is injected by the spaces module through the dashboard extension seam.
          </p>
        </div>

        <button
          type="button"
          class="primary-button"
          :disabled="creating"
          @click="createSpace()"
        >
          <x-icon>add</x-icon>
          <span>New Space</span>
        </button>
      </div>

      <template x-if="noticeText">
        <div class="dashboard-spaces-launcher-notice" :class="{ 'is-error': noticeTone === 'error' }">
          <x-icon x-text="noticeTone === 'error' ? 'error' : 'info'"></x-icon>
          <span x-text="noticeText"></span>
        </div>
      </template>

      <div class="dashboard-spaces-launcher-list">
        <template x-if="loading && !hasEntries">
          <div class="dashboard-spaces-launcher-empty">
            <p>Loading spaces...</p>
          </div>
        </template>

        <template x-if="!loading && !hasEntries">
          <div class="dashboard-spaces-launcher-empty">
            <p>No spaces yet.</p>
            <p>Create one to start rendering persisted widgets.</p>
          </div>
        </template>

        <template x-for="item in entries" :key="item.id">
          <article class="dashboard-spaces-launcher-item">
            <button
              type="button"
              class="dashboard-spaces-launcher-open"
              :disabled="deletingSpaceId === item.id"
              @click="openSpace(item.id)"
            >
              <span class="dashboard-spaces-launcher-title" x-text="item.title"></span>
              <span class="dashboard-spaces-launcher-id" x-text="item.id"></span>
              <span class="dashboard-spaces-launcher-meta" x-text="item.widgetCountLabel"></span>
              <span class="dashboard-spaces-launcher-meta" x-text="item.updatedAtLabel"></span>
            </button>

            <button
              type="button"
              class="secondary-button danger dashboard-spaces-launcher-delete"
              :disabled="deletingSpaceId === item.id"
              @click="deleteSpace(item.id)"
            >
              <x-icon x-text="deletingSpaceId === item.id ? 'hourglass_top' : 'delete'"></x-icon>
              <span x-text="deletingSpaceId === item.id ? 'Deleting...' : 'Delete'"></span>
            </button>
          </article>
        </template>
      </div>
    </section>
  </body>
</html>
